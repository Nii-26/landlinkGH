<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
        <title>Data Collector for AGOL</title>

                <style>
                     html, body {
                         padding: 0;
                         margin: 0;
                         height: 100%;
                         background: #fff;
                     }
                     /* Narrow portrait map to match screenshot */
                     #viewDiv {
                         width: 360px;
                         height: 900px;
                         margin: 20px auto;
                         border: 6px solid #2f2f2f;
                         box-shadow: 0 0 0 6px #ffffff inset;
                     }
                </style>
        <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
        <script src="https://js.arcgis.com/4.26/"></script>
        <script>
             require([ "esri/config", "esri/Map", "esri/views/MapView", "esri/widgets/Search", "esri/widgets/Expand", "esri/widgets/Locate", "esri/layers/FeatureLayer", "esri/widgets/ScaleBar", "esri/Graphic" ], (esriConfig, Map, MapView, Search, Expand, Locate, FeatureLayer, ScaleBar, Graphic) => {

                 esriConfig.apiKey = "AAPTaLCDzfLzcE5Q2HXKI5_Lgvw..CNjEP7VVPjEGnk4qt9aaPgofWZzD10GpMc_xR3LTu-ChHMQ4GR3VXQ2X8loGdzm2mEeJWS8Om1XeZV8LwBWGBmYanviwgXGVofIltQGuY8moQcu05esmUrEJVl7MKM7ELL52FcOY79wftH8756erm335H4nkNaBKv-pqW2Czr6xRR7JyOtJOVS1lnSjTuyXChRYJaybmoQHS3T6ml_GJ5LmPA-Pqz80SYJNZHJTp9fh0-wMyEd26t5TzF7Ogr1Hf7za2Rz3ZpM84YeEa52sY-w..AT1_bryZT1WS";
                const map = new Map({
                    basemap: "satellite"
                });
                const view = new MapView({
                    container: "viewDiv", // Reference to the DOM node that will contain the view
                    map: map, // References the map object
                    center: [-79.9763, 32.8382], // longitude, latitude (Moncks Corner, SC)
                    zoom:3
                });

                // Create the Search widget
                const searchWidget = new Search({
                    view: view
                });

                // Wrap the search widget in the Expand widget
                const searchExpand = new Expand({
                    view: view,
                    content: searchWidget,
                    expandIcon: "search"
                });

                // Add the expand widget to the view
                view.ui.add(searchExpand, {
                    position: "top-left",
                    index: 0
                });

                // FeatureLayer: set your layer URL here. Leave empty to skip loading the layer.
                const FEATURE_LAYER_URL = ""; // e.g. "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/your_layer/FeatureServer/0"
                let layer = null;
                if (FEATURE_LAYER_URL) {
                    layer = new FeatureLayer({
                        url: FEATURE_LAYER_URL
                    });
                    map.add(layer);
                } else {
                    console.warn("No FeatureLayer URL provided — skipping layer creation.");
                }

                // Create the Locate widget and add it to the view
                const locateBtn = new Locate({
                    view: view
                });
                view.ui.add(locateBtn, {
                    position: "top-left",
                    index: 1
                });

                // Add a visible red point marker at the initial center
                const point = {
                    type: "point",
                    longitude: -79.9763,
                    latitude: 32.8382
                };
                const markerSymbol = {
                    type: "simple-marker",
                    color: "red",
                    size: "12px",
                    outline: {
                        color: "#ffffff",
                        width: 1
                    }
                };
                const pointGraphic = new Graphic({
                    geometry: point,
                    symbol: markerSymbol
                });
                view.graphics.add(pointGraphic);

                // Add a scale bar to match the screenshot layout
                const scalebar = new ScaleBar({
                    view: view,
                    unit: "metric"
                });
                view.ui.add(scalebar, {
                    position: "bottom-left"
                });

                // Listen for errors on the Locate button
                locateBtn.on("locate-error", (event) => {
                    console.error("Locate Widget Error:", event.error);
                    alert("Unable to find your location. Please check your phone's privacy settings or ensure your GPS signal is strong.");
                });

                // Catch errors when the layer fails to load (only if a layer was created)
                if (layer && layer.load) {
                    layer.load().catch((error) => {
                        console.error("FeatureLayer failed to load:", error);
                        alert("Notice: The survey data layer is temporarily unavailable. You can still add a record using the submission form.");
                    });
                }

            });
       </script>
        </head>
        <body>
            
            <div id="viewDiv"></div>
        
        </body>
</html>
