<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
        <title>Data Collector for AGOL</title>

        <style>
           html,
           body,
           #viewDiv {
             padding: 0;
             margin: 0;
             height: 100vh;
             width: 100vw;
             overflow: hidden;
           }
        </style>
        <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
        <script src="https://js.arcgis.com/4.26/"></script>
        <script>
             require([ "esri/config", "esri/Map", "esri/views/MapView", "esri/widgets/Search", "esri/widgets/Expand", "esri/widgets/Locate", "esri/layers/FeatureLayer" ], (esriConfig, Map, MapView, Search, Expand, Locate, FeatureLayer) => {

                 esriConfig.apiKey = "AAPTaLCDzfLzcE5Q2HXKI5_Lgvw..CNjEP7VVPjEGnk4qt9aaPgofWZzD10GpMc_xR3LTu-ChHMQ4GR3VXQ2X8loGdzm2mEeJWS8Om1XeZV8LwBWGBmYanviwgXGVofIltQGuY8moQcu05esmUrEJVl7MKM7ELL52FcOY79wftH8756erm335H4nkNaBKv-pqW2Czr6xRR7JyOtJOVS1lnSjTuyXChRYJaybmoQHS3T6ml_GJ5LmPA-Pqz80SYJNZHJTp9fh0-wMyEd26t5TzF7Ogr1Hf7za2Rz3ZpM84YeEa52sY-w..AT1_bryZT1WS";
                const map = new Map({
                    basemap: "satellite"
                });
                const view = new MapView({
                    container: "viewDiv", // Reference to the DOM node that will contain the view
                    map: map, // References the map object
                    center: [-79.9763, 32.8382], // longitude, latitude (Moncks Corner, SC)
                    zoom: 13
                });

                // Create the Search widget
                const searchWidget = new Search({
                    view: view
                });

                // Wrap the search widget in the Expand widget
                const searchExpand = new Expand({
                    view: view,
                    content: searchWidget,
                    expandIcon: "search"
                });

                // Add the expand widget to the view
                view.ui.add(searchExpand, {
                    position: "top-left",
                    index: 0
                });

                // Create a FeatureLayer (replace the URL with your layer's URL)
                const layer = new FeatureLayer({
                    // url: "https://services.arcgis.com/.../FeatureServer/0"
                });

                // Create the Locate widget and add it to the view
                const locateBtn = new Locate({
                    view: view
                });
                view.ui.add(locateBtn, {
                    position: "top-left",
                    index: 1
                });

                // Listen for errors on the Locate button
                locateBtn.on("locate-error", (event) => {
                    console.error("Locate Widget Error:", event.error);
                    alert("Unable to find your location. Please check your phone's privacy settings or ensure your GPS signal is strong.");
                });

                // Catch errors when the layer fails to load
                if (layer && layer.load) {
                    layer.load().catch((error) => {
                        console.error("FeatureLayer failed to load:", error);
                        alert("Notice: The survey data layer is temporarily unavailable. You can still add a record using the submission form.");
                    });
                }

            });
       </script>
        </head>
        <body>
            
            <div id="viewDiv"></div>
        
        </body>
</html>
