<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
        <title>LandlinkGH</title>

                <style>
                     html, body, #viewDiv {
                         width: 100vw;
                         height: 100dvh;
                         margin: 0;
                         padding: 0;
                         overflow: hidden;
                     }
                     html, body {
                         background: #fff;
                     }
                     #viewDiv {
                         position: relative;
                         box-sizing: border-box;
                         border: 6px solid #2f2f2f;
                         box-shadow: 0 0 0 6px #ffffff inset;
                     }
                     .addRecordBtn {
                         position: absolute;
                         z-index: 10;
                         top: 10px;
                         right: 10px;
                         background-color: #28a745;
                         color: white;
                         padding: 8px 16px;
                         border: none;
                         border-radius: 4px;
                         font-size: 14px;
                         cursor: pointer;
                         text-decoration: none;
                     }
                     .addRecordBtn:hover {
                         background-color: #1e7e34;
                     }
                     @media (max-width: 430px) {
                         #viewDiv {
                             border-width: 0;
                             box-shadow: none;
                         }
                         .addRecordBtn {
                             top: auto;
                             right: calc(env(safe-area-inset-right) + 12px);
                             bottom: calc(env(safe-area-inset-bottom) + 12px);
                             border-radius: 12px;
                             padding: 12px 16px;
                             font-size: 16px;
                             line-height: 1.2;
                             min-height: 44px;
                             min-width: 120px;
                             box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
                         }
                         .esri-ui-top-left {
                             top: calc(env(safe-area-inset-top) + 8px) !important;
                             left: calc(env(safe-area-inset-left) + 8px) !important;
                         }
                         .esri-ui-top-right {
                             top: calc(env(safe-area-inset-top) + 8px) !important;
                             right: calc(env(safe-area-inset-right) + 8px) !important;
                         }
                         .esri-search {
                             width: min(74vw, 300px);
                         }
                     }
                     @media (min-width: 768px) and (max-width: 1024px) {
                         html, body, #viewDiv {
                             width: 100vw;
                             height: 100vh;
                             margin: 0;
                             padding: 0;
                             overflow: hidden;
                         }
                         #viewDiv {
                             border-width: 4px;
                             box-shadow: 0 0 0 4px #ffffff inset;
                         }
                         .addRecordBtn {
                             top: 16px;
                             right: 16px;
                             padding: 10px 18px;
                             font-size: 16px;
                         }
                     }
                </style>
        <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
        <script src="https://js.arcgis.com/4.26/"></script>
        <script>
             require([ "esri/config", "esri/Map", "esri/views/MapView", "esri/widgets/Search", "esri/widgets/Search/SearchSource", "esri/widgets/Expand", "esri/widgets/Locate", "esri/layers/GeoJSONLayer", "esri/widgets/ScaleBar", "esri/Graphic" ], (esriConfig, Map, MapView, Search, SearchSource, Expand, Locate, GeoJSONLayer, ScaleBar, Graphic) => {

                 esriConfig.apiKey = "AAPTaLCDzfLzcE5Q2HXKI5_Lgvw..CNjEP7VVPjEGnk4qt9aaPgofWZzD10GpMc_xR3LTu-ChHMQ4GR3VXQ2X8loGdzm2mEeJWS8Om1XeZV8LwBWGBmYanviwgXGVofIltQGuY8moQcu05esmUrEJVl7MKM7ELL52FcOY79wftH8756erm335H4nkNaBKv-pqW2Czr6xRR7JyOtJOVS1lnSjTuyXChRYJaybmoQHS3T6ml_GJ5LmPA-Pqz80SYJNZHJTp9fh0-wMyEd26t5TzF7Ogr1Hf7za2Rz3ZpM84YeEa52sY-w..AT1_bryZT1WS";
                const isPhoneLayout = window.matchMedia("(max-width: 430px)").matches;
                const map = new Map({
                    basemap: "arcgis-topographic" // Basemap layer
                });
                const view = new MapView({
                    container: "viewDiv", // Reference to the DOM node that will contain the view
                    map: map, // References the map object
                    center: [-0.186, 5.586], // longitude, latitude tuned to match screenshot view
                    zoom: 14.2,
                    padding: isPhoneLayout
                        ? { top: 84, right: 8, bottom: 96, left: 8 }
                        : { top: 0, right: 0, bottom: 0, left: 0 }
                });

                // Parcel layer from a local GeoJSON file.
                const parcelLayer = new GeoJSONLayer({
                    url: "./parcels.geojson",
                    title: "Parcel Layer",
                    renderer: {
                        type: "simple",
                        symbol: {
                            type: "simple-fill",
                            color: [76, 175, 80, 0.25],
                            outline: {
                                color: [0, 128, 0, 1],
                                width: 1.5
                            }
                        }
                    },
                    popupTemplate: {
                        title: "{parcel_id}",
                        content: [
                            {
                                type: "text",
                                text: "<b>Owner Name:</b> {owner}<br/><b>Parcel Size:</b> {parcel_size}<br/><b>Land Use:</b> {land_use}<br/><b>Registration Date:</b> {registration_date}"
                            }
                        ]
                    }
                });
                map.add(parcelLayer);

                // Keep startup zoom fixed to match the desired map opening view.

                // Create a parcel search source that searches by Parcel ID or Owner Name.
                const parcelSearchSource = new SearchSource({
                    layer: parcelLayer,
                    searchFields: ["parcel_id", "owner"],
                    displayField: "parcel_id",
                    exactMatch: false,
                    outFields: ["*"],
                    name: "Parcels",
                    placeholder: "Search parcel ID or owner"
                });

                // Create the Search widget and bind it to the parcel layer.
                const searchWidget = new Search({
                    view: view,
                    sources: [parcelSearchSource]
                });

                // Wrap the search widget in the Expand widget
                const searchExpand = new Expand({
                    view: view,
                    content: searchWidget,
                    expandIcon: "search"
                });

                // Add the expand widget to the view
                view.ui.add(searchExpand, {
                    position: "top-left",
                    index: 0
                });

                // Create the Locate widget and add it to the view
                const locateBtn = new Locate({
                    view: view
                });
                view.ui.add(locateBtn, {
                    position: isPhoneLayout ? "top-right" : "top-left",
                    index: isPhoneLayout ? 0 : 1
                });

                // Add a visible red point marker at the initial center
                const point = {
                    type: "point",
                    longitude: -0.205,
                    latitude: 5.6037
                };
                const markerSymbol = {
                    type: "simple-marker",
                    color: "red",
                    size: "12px",
                    outline: {
                        color: "#ffffff",
                        width: 1
                    }
                };
                const pointGraphic = new Graphic({
                    geometry: point,
                    symbol: markerSymbol
                });
                view.graphics.add(pointGraphic);

                // Add a scale bar to match the screenshot layout
                const scalebar = new ScaleBar({
                    view: view,
                    unit: "metric"
                });
                if (!isPhoneLayout) {
                    view.ui.add(scalebar, {
                        position: "bottom-left"
                    });
                }

                // Listen for errors on the Locate button
                locateBtn.on("locate-error", (event) => {
                    console.error("Locate Widget Error:", event.error);
                    alert("Unable to find your location. Please check your phone's privacy settings or ensure your GPS signal is strong.");
                });

                // Catch errors when the parcel layer fails to load.
                if (parcelLayer && parcelLayer.load) {
                    parcelLayer.load().catch((error) => {
                        console.error("Parcel layer failed to load:", error);
                        alert("Notice: The parcel layer is temporarily unavailable.");
                    });
                }

            });
       </script>
        </head>
        <body>
            <div id="viewDiv">
                <a href="https://arcg.is/01zHv12" target="_blank" class="addRecordBtn">Add Record</a>
            </div>
        </body>
</html>
